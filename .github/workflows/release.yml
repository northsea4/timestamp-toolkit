name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag, for example v0.2.4'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          release_version="${release_tag#v}"

          if [[ "${release_tag}" != v* ]]; then
            echo "Release tag must start with v, got ${release_tag}." >&2
            exit 1
          fi

          if [[ "${release_version}" != "${package_version}" ]]; then
            echo "Release tag ${release_tag} does not match package.json version ${package_version}." >&2
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=timestamp-toolkit-${package_version}.zip" >> "${GITHUB_OUTPUT}"

      - name: Build
        run: pnpm build

      - name: Package extension
        run: |
          cd dist
          zip -r "../${{ steps.version.outputs.asset_name }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.asset_name }}
          path: ${{ steps.version.outputs.asset_name }}
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.version.outputs.asset_name }}" \
            --title "timestamp-toolkit ${{ steps.version.outputs.version }}" \
            --generate-notes
